# Nginx — programari.visio.md → Node pe port 3005
# Copiază în /etc/nginx/sites-available/ și activează cu symlink în sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name programari.visio.md;

    # Redirect HTTP → HTTPS (după ce ai certificat SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name programari.visio.md;

    # Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/programari.visio.md/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/programari.visio.md/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Securitate
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }
}
